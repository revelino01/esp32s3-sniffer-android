name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Generate signing keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias sniffer -keyalg RSA -keysize 2048 -validity 10000 -storepass snifferpass -keypass snifferpass -dname "CN=Sniffer"

      - name: Build signed APK
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$PWD/release.keystore -Pandroid.injected.signing.store.password=snifferpass -Pandroid.injected.signing.key.alias=sniffer -Pandroid.injected.signing.key.password=snifferpass

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sniffer-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
